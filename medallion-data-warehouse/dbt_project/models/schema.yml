version: 2

models:
  - name: slv_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - unique:
              config:
                severity: warn
      - name: is_active
        tests:
          - accepted_values:
              values: [true, false]
              config:
                severity: warn

  - name: slv_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: price
        tests:
          - not_null
      - name: currency_code
        tests:
          - accepted_values:
              values: ['USD', 'EUR', 'GBP', 'CAD']

  - name: slv_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ['pending', 'shipped', 'delivered', 'cancelled']

  - name: dim_customer
    columns:
      - name: customer_sk
        tests:
          - unique
          - not_null

  - name: dim_product
    columns:
      - name: product_sk
        tests:
          - unique
          - not_null

  - name: fact_sales
    columns:
      - name: sales_sk
        tests:
          - unique
          - not_null
      - name: customer_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_sk
      - name: product_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_sk

  - name: fact_inventory
    columns:
      - name: inventory_sk
        tests:
          - unique
          - not_null
      - name: product_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_sk
      - name: quantity_on_hand
        tests:
          - not_null

  - name: slv_inventory
    columns:
      - name: inventory_id
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: warehouse_id
        tests:
          - not_null
          - accepted_values:
              values: ['WH-EAST', 'WH-WEST', 'WH-CENTRAL', 'WH-SOUTH', 'WH-NORTH', 'UNKNOWN']
  - name: slv_shipments
    columns:
      - name: shipment_id
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: carrier
        tests:
          - not_null
  - name: slv_returns
    columns:
      - name: return_id
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
  - name: slv_marketing
    columns:
      - name: campaign_id
        tests:
          - unique
          - not_null
      - name: channel
        tests:
          - not_null
