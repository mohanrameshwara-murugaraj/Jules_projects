name: Automated Market Signal Pipeline

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Ticker symbol to process (e.g. BTC-USD, AAPL)'
        required: false
        default: 'BTC-USD'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest tests/

    - name: Run the pipeline
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        TICKER="${{ github.event.inputs.ticker || 'BTC-USD' }}"
        python src/run_pipeline.py --ticker "$TICKER"

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        # Add changed files
        git add data/ models/ reports/ README.md

        # Check if there are changes
        if git diff-index --quiet HEAD --; then
          echo "No changes to commit."
        else
          git commit -m "Automated update: market signals, metrics, and models"
          git push
        fi
